version: "3"
services:
  recv_hls_service:
    build:
      context: ./../../../../
      dockerfile: examples/echo_service/_service/Dockerfile
    networks:
      - local-network
  recv_hls:
    build:
      context: ./../../../../
      dockerfile: cmd/hlc/Dockerfile
      args:
        - BUILD_TAGS=symmetric
    environment:
      - SERVICE_PATH=examples/echo_service/schemes/symmetric/recv_hls
    networks:
      - local-network
      - hidden-lake
  send_hls:
    build:
      context: ./../../../../
      dockerfile: cmd/hlc/Dockerfile
      args:
        - BUILD_TAGS=symmetric
    environment:
      - SERVICE_PATH=examples/echo_service/schemes/symmetric/send_hls
    ports:
      - 7572:7572
    networks:
      - hidden-lake
  middle_hla:
    build:
      context: ./../../../../
      dockerfile: cmd/hla/hla-tcp/Dockerfile
    environment:
      - SERVICE_PATH=examples/echo_service/schemes/symmetric/middle_hla
    networks:
      - hidden-lake
networks:
  local-network:
    driver: bridge
  hidden-lake:
    driver: bridge
